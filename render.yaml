services:
  - type: web
    name: g10-reporteria-mock
    runtime: node
    buildCommand: |
      npm install
      npm install -g pnpm
      cd dashboard && pnpm install && pnpm run build && cd ..
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # se configura manualmente en el dashboard de Render (secreto, no se commitea)
      # G7/G8: no se listan acá a propósito, igual que AUTH_SERVICE_URL,
      # ORDERS_SERVICE_URL y G9_NOTIFICATIONS_URL — el código ya tiene sus
      # URLs de producción reales como default (ver .env.example), así que
      # no hace falta duplicarlas aquí. G6 sí se lista porque no tiene un
      # default real todavía (ver src/services/g6PaymentsClient.js).
      - key: G6_PAYMENTS_SERVICE_URL
        sync: false   # G6 todavía no comparte una URL de producción — queda sin setear hasta que la confirmen
      # G6 vía RabbitMQ (src/services/g6PaymentsConsumer.js) — RABBITMQ_URL
      # es secreto (connection string con credenciales), igual que
      # DATABASE_URL. Exchange y routing keys no son secretos, pero se
      # listan igual para que quede explícito en Render cuál es el valor
      # real que se está usando (ver la nota de "sin confirmar" en
      # .env.example antes de cambiarlos).
      - key: RABBITMQ_URL
        sync: false
      - key: RABBITMQ_EXCHANGE
        value: payments.events
      - key: G6_PAYMENT_ROUTING_KEYS
        value: payment.approved,payment.rejected
