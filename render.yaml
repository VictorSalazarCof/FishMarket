services:
  - type: web
    name: g10-reporteria-mock
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # se configura manualmente en el dashboard de Render (secreto, no se commitea)
