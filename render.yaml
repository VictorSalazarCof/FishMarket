services:
  - type: web
    name: g10-reporteria-mock
    runtime: node
    buildCommand: |
      npm install
      npm install -g pnpm
      cd dashboard && pnpm install && pnpm run build && cd ..
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # se configura manualmente en el dashboard de Render (secreto, no se commitea)
